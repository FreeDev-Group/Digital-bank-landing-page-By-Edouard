<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <header class="header">

        <div class="container nav">

            <img src="images/logo-dark.svg" alt="Easybank">

            <nav>
                <ul class="nav-links">

                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Careers</a></li>

                </ul>
            </nav>

            <button class="btn desktop-btn">Request Invite</button>

            <img src="images/icon-hamburger.svg" class="hamburger" id="menuBtn">
